[tool.pyrefly]
# Pyrefly creates virtual in-memory files at /__pyrefly_virtual__/ to
# type-check f-string expressions in isolation. Converting those f-strings
# to str.format() calls in App.py eliminates most false positives.
# The remaining warnings (types-requests, types-PyMySQL, types-psycopg2)
# can be resolved by: pip install types-requests types-psycopg2 types-PyMySQL

use_untyped_imports = true

# Don't analyse venv or cache directories
project-excludes = [
    "venv/**",
    "__pycache__/**",
    "__pyrefly_virtual__/**",
    "**/inmemory/**",
]
